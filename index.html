<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sem código</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #1a1a2e;
      font-family: 'Segoe UI', sans-serif;
    }

    .container {
      text-align: center;
      padding: 3rem 2rem;
      max-width: 600px;
    }

    .emoji {
      font-size: 80px;
      display: block;
      margin-bottom: 1.5rem;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      color: #ffffff;
      line-height: 1.4;
      margin-bottom: 1rem;
    }

    h1 span {
      color: #e94560;
    }

    .subtitle {
      font-size: 1rem;
      color: #a0a0b0;
      margin-top: 2rem;
      padding: 0.75rem 1.5rem;
      border: 1px solid #2e2e4e;
      border-radius: 8px;
      background-color: #16213e;
      display: inline-block;
    }
  </style>
</head>
<body>
  <div class="container">
    <span class="emoji">💔</span>
    <h1>
      Sem código para <span>namorada</span><br>
      que não dá bom dia<br>
      ao namorado
    </h1>
    <p class="subtitle">Erro 404: bom dia não encontrado 🌅</p>
  </div>
</body>
</html>
